<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat Premium V3</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" />

  <style>
    /* 1. RESET & VARIABLE */
    :root {
      --primary: #6C63FF;
      --accent: #FF6584;
      --glass: rgba(255, 255, 255, 0.85);
      --glass-dark: rgba(255, 255, 255, 0.5);
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
      background: var(--bg-gradient);
      height: 100vh; display: flex; justify-content: center; align-items: center;
      color: #333; overflow: hidden;
    }

    /* 2. MAIN CONTAINER (GLASS EFFECT) */
    .app-container {
      width: 100%; max-width: 450px; height: 90vh;
      background: var(--glass);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    
    @media (max-width: 500px) {
      .app-container { height: 100vh; border-radius: 0; max-width: 100%; }
    }

    /* 3. AUTH SCREEN (LOGIN/REGISTER) */
    #auth-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      padding: 40px; display: flex; flex-direction: column; justify-content: center;
      background: white; z-index: 100; transition: transform 0.3s ease;
    }
    .auth-title { font-size: 28px; font-weight: 600; margin-bottom: 10px; color: var(--primary); }
    .auth-subtitle { font-size: 14px; color: #666; margin-bottom: 30px; }
    
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 12px; margin-bottom: 5px; font-weight: 600; color: #555; }
    .input-field {
      width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 10px;
      font-family: inherit; transition: 0.3s;
    }
    .input-field:focus { border-color: var(--primary); outline: none; }
    
    .btn-primary {
      width: 100%; padding: 14px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-weight: 600; cursor: pointer;
      margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4); }
    
    .switch-text { text-align: center; margin-top: 20px; font-size: 13px; }
    .switch-text span { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: underline; }

    /* 4. CHAT HEADER */
    header {
      padding: 15px 20px; background: rgba(255,255,255,0.9);
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .profile-info h3 { margin: 0; font-size: 16px; }
    .online-status { font-size: 11px; color: #2ecc71; display: flex; align-items: center; gap: 4px; }
    .btn-logout { background: none; border: none; color: #ff4757; cursor: pointer; }

    /* 5. CHAT AREA */
    #chat-box {
      flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
      background: #f4f7f6; scroll-behavior: smooth;
    }
    
    .message { max-width: 75%; position: relative; font-size: 14px; line-height: 1.5; padding: 10px 14px; border-radius: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    
    /* Pesan Orang Lain */
    .message.left { align-self: flex-start; background: white; border-bottom-left-radius: 2px; color: #333; }
    .sender-name { font-size: 10px; font-weight: bold; color: var(--primary); margin-bottom: 2px; display: block; }
    
    /* Pesan Saya */
    .message.right { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
    .message.right .sender-name { display: none; }
    
    .message img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
    .time { font-size: 9px; opacity: 0.7; text-align: right; margin-top: 4px; }

    /* 6. INPUT AREA */
    .input-area {
      padding: 15px; background: white; display: flex; align-items: center; gap: 10px;
    }
    .file-btn { color: #888; cursor: pointer; padding: 5px; }
    .file-btn:hover { color: var(--primary); }
    
    #msg-input {
      flex: 1; padding: 12px; background: #f0f2f5; border: none; border-radius: 20px; outline: none; font-family: inherit;
    }
    #send-btn {
      background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; display: flex; justify-content: center; align-items: center;
    }

    /* UTILITY */
    .hidden { display: none !important; }
    #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:200; display:flex; justify-content:center; align-items:center; display:none;}
  </style>
</head>
<body>

<div id="loading">Loading...</div>

<div class="app-container">
  
  <div id="auth-screen">
    <div id="form-login">
      <div class="auth-title">Welcome Back 👋</div>
      <div class="auth-subtitle">Masuk untuk mulai chatting</div>
      
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="login-email" class="input-field" placeholder="contoh@email.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-pass" class="input-field" placeholder="********">
      </div>
      <button id="btn-do-login" class="btn-primary">Masuk</button>
      <div class="switch-text">Belum punya akun? <span onclick="switchForm('register')">Daftar dulu</span></div>
    </div>

    <div id="form-register" class="hidden">
      <div class="auth-title">Create Account 🚀</div>
      <div class="auth-subtitle">Buat akun agar chatmu aman</div>
      
      <div class="input-group">
        <label>Username (Nama Tampil)</label>
        <input type="text" id="reg-username" class="input-field" placeholder="Budi Ganteng">
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="reg-email" class="input-field" placeholder="contoh@email.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="reg-pass" class="input-field" placeholder="Minimal 6 karakter">
      </div>
      <button id="btn-do-register" class="btn-primary">Daftar Akun</button>
      <div class="switch-text">Sudah punya akun? <span onclick="switchForm('login')">Login disini</span></div>
    </div>
  </div>

  <div id="chat-screen" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
    <header>
      <div class="profile-info">
        <h3 id="display-name">User</h3>
        <div class="online-status">● Online</div>
      </div>
      <button class="btn-logout" id="btn-logout">
        <span class="material-symbols-rounded">logout</span>
      </button>
    </header>

    <div id="chat-box"></div>

    <div class="input-area">
      <input type="file" id="file-input" accept="image/*" hidden>
      <span class="material-symbols-rounded file-btn" id="btn-file">image</span>
      <input type="text" id="msg-input" placeholder="Tulis pesan..." autocomplete="off">
      <button id="send-btn">
        <span class="material-symbols-rounded">send</span>
      </button>
    </div>
  </div>

</div>

<script type="module">
  // Import Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, push, set, get, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  // === KONFIGURASI (JANGAN LUPA GANTI INI LAGI) ===
  const firebaseConfig = {
    apiKey: "AIzaSyC8K8RbOFFov1OgL2R4KhE9_GcPZVnl3rM",
    authDomain: "chatv2-6016c.firebaseapp.com",
    databaseURL: "https://chatv2-6016c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "chatv2-6016c",
    storageBucket: "chatv2-6016c.firebasestorage.app",
    messagingSenderId: "9135681580",
    appId: "1:9135681580:web:9bb64a480ddc49c968e189",
    measurementId: "G-1Q5S8TLX3V"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  // UI References
  const authScreen = document.getElementById('auth-screen');
  const chatScreen = document.getElementById('chat-screen');
  const chatBox = document.getElementById('chat-box');
  const loading = document.getElementById('loading');

  // --- LOGIC AUTHENTICATION ---
  
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('display-name').textContent = "@" + user.displayName; // Tambah @ biar keren
      authScreen.style.transform = "translateY(-100%)";
      setTimeout(() => {
          authScreen.classList.add('hidden');
          chatScreen.classList.remove('hidden');
          chatScreen.style.display = 'flex';
      }, 300);
    } else {
      authScreen.classList.remove('hidden');
      authScreen.style.transform = "translateY(0)";
      chatScreen.classList.add('hidden');
    }
  });

  // === FITUR BARU: REGISTER DENGAN VALIDASI INSTAGRAM STYLE ===
  document.getElementById('btn-do-register').addEventListener('click', async () => {
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-pass').value;
    // Ubah ke lowercase biar konsisten (budi.01 sama dengan BUDI.01)
    const rawUsername = document.getElementById('reg-username').value.toLowerCase().trim(); 

    // 1. Validasi Input Kosong
    if(!email || !pass || !rawUsername) return alert("Semua kolom wajib diisi!");

    // 2. Validasi Format Username (Hanya Huruf, Angka, Titik, Underscore)
    // Regex: ^ (awal), [a-z0-9._] (karakter yang boleh), + (minimal 1), $ (akhir)
    const usernameRegex = /^[a-z0-9._]+$/;
    
    if (!usernameRegex.test(rawUsername)) {
      alert("Username TIDAK VALID!\n\n- Tidak boleh ada spasi\n- Hanya boleh huruf kecil, angka, titik (.), dan underscore (_)\n- Contoh: budi.ganteng_01");
      return;
    }

    showLoading(true);
    
    try {
      // 3. Cek apakah Username sudah dipakai orang lain di Database
      const userRef = ref(db, 'users/' + rawUsername);
      const snapshot = await get(userRef);

      if (snapshot.exists()) {
        throw new Error("Username sudah dipakai orang lain. Cari nama lain!");
      }

      // 4. Jika aman, buat akun Auth
      const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
      
      // 5. Update Profile Auth
      await updateProfile(userCredential.user, { displayName: rawUsername });

      // 6. SIMPAN KE DATABASE (Agar bisa dicari orang lain)
      // Kita simpan email dan uid di node 'users/username'
      await set(userRef, {
        email: email,
        uid: userCredential.user.uid
      });

      alert("Registrasi Berhasil! Username kamu: @" + rawUsername);
      
    } catch (error) {
      alert("Gagal: " + error.message);
    } finally {
      showLoading(false);
    }
  });

  document.getElementById('btn-do-login').addEventListener('click', async () => {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-pass').value;
    showLoading(true);
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (error) {
      alert("Login Gagal: Cek email/password.");
    } finally {
      showLoading(false);
    }
  });

  document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

  // === FITUR BARU: PENCARIAN USER ===
  document.getElementById('btn-search').addEventListener('click', async () => {
    const searchName = prompt("Masukkan username yang dicari (tanpa @):");
    if (!searchName) return;

    const targetName = searchName.toLowerCase().trim();
    showLoading(true);

    try {
      // Cek langsung ke path users/username
      const snapshot = await get(ref(db, 'users/' + targetName));
      
      if (snapshot.exists()) {
        const data = snapshot.val();
        // Disini kamu bisa kembangkan mau ngapain kalau ketemu.
        // Untuk sekarang kita tampilkan info saja.
        alert(`✅ DITEMUKAN!\n\nUser: @${targetName}\nStatus: Terdaftar di Database`);
      } else {
        alert(`❌ User @${targetName} tidak ditemukan.`);
      }
    } catch (e) {
      alert("Error saat mencari.");
    } finally {
      showLoading(false);
    }
  });

  // --- LOGIC CHAT (SAMA SEPERTI SEBELUMNYA) ---
  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('msg-input').addEventListener('keydown', (e) => {
    if(e.key === "Enter") sendMessage();
  });

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    const user = auth.currentUser;
    if (!text || !user) return;

    await push(ref(db, 'chats_v3'), {
      uid: user.uid,
      name: user.displayName, // Ini sekarang sudah pasti username valid
      text: text,
      type: 'text',
      timestamp: serverTimestamp()
    });
    input.value = "";
  }

  document.getElementById('btn-file').addEventListener('click', () => document.getElementById('file-input').click());
  
  document.getElementById('file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    const user = auth.currentUser;
    if (!file || !user) return;
    showLoading(true);
    try {
      const storageRef = sRef(storage, `images/${Date.now()}_${file.name}`);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);
      await push(ref(db, 'chats_v3'), {
        uid: user.uid,
        name: user.displayName,
        text: url,
        type: 'image',
        timestamp: serverTimestamp()
      });
    } catch (err) { alert(err.message); } finally { showLoading(false); document.getElementById('file-input').value = ""; }
  });

  onChildAdded(ref(db, 'chats_v3'), (snapshot) => {
    const msg = snapshot.val();
    const user = auth.currentUser;
    const isMe = user && msg.uid === user.uid;
    const div = document.createElement('div');
    div.className = `message ${isMe ? 'right' : 'left'}`;
    let contentHTML = `<span class="sender-name">@${msg.name}</span>`;
    if (msg.type === 'image') contentHTML += `<img src="${msg.text}" onclick="window.open(this.src)">`;
    else contentHTML += `${msg.text}`;
    contentHTML += `<div class="time">${new Date(msg.timestamp || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>`;
    div.innerHTML = contentHTML;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });

  window.switchForm = (type) => {
    if (type === 'register') {
      document.getElementById('form-login').classList.add('hidden');
      document.getElementById('form-register').classList.remove('hidden');
    } else {
      document.getElementById('form-login').classList.remove('hidden');
      document.getElementById('form-register').classList.add('hidden');
    }
  };
  function showLoading(show) { loading.style.display = show ? 'flex' : 'none'; }
</script>

</body>
</html>
