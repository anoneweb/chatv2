<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat V2 - Multimedia & Realtime</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <style>
    /* CSS MODERN DARK/LIGHT THEME */
    :root {
      --primary: #4f46e5;
      --bg: #f3f4f6;
      --chat-bg: #ffffff;
      --my-msg: #4f46e5;
      --their-msg: #e5e7eb;
      --text: #1f2937;
    }

    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; }

    /* LAYOUT UTAMA */
    #app-container {
      max-width: 600px; width: 100%; margin: 0 auto; background: white; 
      height: 100%; display: flex; flex-direction: column; position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    /* HEADER */
    header {
      padding: 15px; background: white; border-bottom: 1px solid #ddd;
      display: flex; justify-content: space-between; align-items: center; z-index: 10;
    }
    .header-info h2 { margin: 0; font-size: 18px; }
    .status-badge { font-size: 12px; color: green; display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; background: limegreen; border-radius: 50%; }

    /* LOGIN SCREEN */
    #login-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99;
    }
    .login-box {
      background: white; padding: 30px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;}
    .login-box button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;}

    /* AREA CHAT */
    #chat-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #f9fafb; }
    
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; position: relative; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
    .msg.me { align-self: flex-end; background: var(--my-msg); color: white; border-bottom-right-radius: 2px; }
    .msg.others { align-self: flex-start; background: var(--their-msg); color: var(--text); border-bottom-left-radius: 2px; }
    
    .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; cursor: pointer;}
    .msg-meta { font-size: 10px; margin-top: 4px; opacity: 0.7; text-align: right; display: flex; justify-content: space-between;}
    .sender-name { font-weight: bold; margin-bottom: 2px; font-size: 11px; display: block; }

    /* TYPING INDICATOR */
    #typing-indicator { 
      padding: 5px 20px; font-size: 12px; color: #888; font-style: italic; height: 20px; 
      background: #f9fafb;
    }

    /* INPUT AREA */
    #input-area {
      padding: 10px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; gap: 10px;
    }
    #input-area input[type="text"] {
      flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none;
    }
    .icon-btn {
      background: none; border: none; cursor: pointer; color: #555; padding: 8px; border-radius: 50%; transition: 0.2s;
    }
    .icon-btn:hover { background: #eee; color: var(--primary); }
    
    /* Loading Overlay untuk Upload */
    #loading-overlay {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8); z-index: 50; justify-content: center; align-items: center; font-weight: bold;
    }
  </style>
</head>
<body>

<div id="app-container">
  
  <div id="login-screen">
    <div class="login-box">
      <h2>👋 Welcome Back</h2>
      <input type="text" id="username-in" placeholder="Nama Panggilan..." autocomplete="off">
      <button id="btn-login">Masuk Chat</button>
    </div>
  </div>

  <header>
    <div class="header-info">
      <h2 id="room-title">Public Room</h2>
      <div class="status-badge"><div class="dot"></div> <span id="online-count">0 Online</span></div>
    </div>
    <button class="icon-btn" id="btn-logout" title="Logout">
      <span class="material-symbols-outlined">logout</span>
    </button>
  </header>

  <div id="chat-area"></div>
  
  <div id="typing-indicator"></div>

  <div id="input-area">
    <input type="file" id="file-input" accept="image/*" hidden>
    <button class="icon-btn" id="btn-img" title="Kirim Gambar">
      <span class="material-symbols-outlined">image</span>
    </button>

    <input type="text" id="msg-input" placeholder="Tulis pesan..." autocomplete="off">
    
    <button class="icon-btn" id="btn-send">
      <span class="material-symbols-outlined">send</span>
    </button>
  </div>

  <div id="loading-overlay">Mengirim Gambar...</div>
</div>

<script type="module">
  // 1. IMPORT MODUL FIREBASE (Versi Terbaru)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, set, onChildAdded, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  // 2. KONFIGURASI (GANTI DENGAN PUNYAMU)
  const firebaseConfig = {
    apiKey: "GANTI_DENGAN_API_KEY_KAMU",
    authDomain: "GANTI_DENGAN_ID_KAMU.firebaseapp.com",
    databaseURL: "GANTI_DENGAN_URL_DATABASE_KAMU",
    projectId: "GANTI_DENGAN_PROJECT_ID_KAMU",
    storageBucket: "GANTI_DENGAN_BUCKET_KAMU.appspot.com", // Penting untuk upload gambar
    messagingSenderId: "xxx",
    appId: "xxx"
  };

  // Inisialisasi
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);

  // Variabel Global
  let currentUser = localStorage.getItem('chat_user') || null;
  let typingTimeout = null;

  // DOM Elements
  const loginScreen = document.getElementById('login-screen');
  const chatArea = document.getElementById('chat-area');
  const msgInput = document.getElementById('msg-input');
  const fileInput = document.getElementById('file-input');
  const typingDiv = document.getElementById('typing-indicator');
  const onlineCountSpan = document.getElementById('online-count');
  const loadingOverlay = document.getElementById('loading-overlay');

  // --- LOGIC AUTHENTICATION (Sederhana) ---
  if (currentUser) {
    loginScreen.style.display = 'none';
    setupRealtimeFeatures();
  }

  document.getElementById('btn-login').addEventListener('click', () => {
    const name = document.getElementById('username-in').value.trim();
    if(name) {
      currentUser = name;
      localStorage.setItem('chat_user', name);
      loginScreen.style.display = 'none';
      setupRealtimeFeatures();
    }
  });

  document.getElementById('btn-logout').addEventListener('click', () => {
    // Hapus status online sebelum logout
    if (currentUser) remove(ref(db, `status/${currentUser}`));
    localStorage.removeItem('chat_user');
    location.reload();
  });

  // --- LOGIC KIRIM PESAN ---
  async function sendMessage(text = null, imgUrl = null) {
    if (!currentUser) return;
    
    const chatRef = ref(db, 'messages');
    const newMsg = {
      user: currentUser,
      text: text || "",
      image: imgUrl || "",
      timestamp: Date.now()
    };
    await push(chatRef, newMsg);
    msgInput.value = "";
  }

  document.getElementById('btn-send').addEventListener('click', () => {
    if (msgInput.value.trim()) sendMessage(msgInput.value.trim());
  });

  msgInput.addEventListener('keydown', (e) => {
    if (e.key === "Enter") document.getElementById('btn-send').click();
    handleTyping();
  });

  // --- LOGIC UPLOAD GAMBAR (FIREBASE STORAGE) ---
  document.getElementById('btn-img').addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    loadingOverlay.style.display = 'flex'; // Tampilkan loading

    try {
      // 1. Buat referensi unik
      const fileName = Date.now() + '-' + file.name;
      const storageRef = sRef(storage, 'chat_images/' + fileName);

      // 2. Upload
      await uploadBytes(storageRef, file);

      // 3. Ambil URL
      const url = await getDownloadURL(storageRef);

      // 4. Kirim sebagai pesan
      await sendMessage(null, url);

    } catch (err) {
      alert("Gagal upload: " + err.message);
    } finally {
      loadingOverlay.style.display = 'none'; // Sembunyikan loading
      fileInput.value = ''; // Reset input
    }
  });

  // --- LOGIC TERIMA PESAN (REALTIME) ---
  onChildAdded(ref(db, 'messages'), (snapshot) => {
    const data = snapshot.val();
    renderMessage(data);
  });

  function renderMessage(data) {
    const isMe = data.user === currentUser;
    const div = document.createElement('div');
    div.className = `msg ${isMe ? 'me' : 'others'}`;

    let content = '';
    if (data.user !== currentUser) {
        content += `<span class="sender-name">${data.user}</span>`;
    }

    if (data.image) {
      content += `<img src="${data.image}" onclick="window.open(this.src)" alt="Image">`;
    }
    if (data.text) {
      content += `<div>${data.text}</div>`;
    }

    // Format jam
    const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    content += `<div class="msg-meta"><span>${time}</span></div>`;

    div.innerHTML = content;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight; // Auto scroll ke bawah
  }

  // --- FITUR KEREN: TYPING INDICATOR & ONLINE STATUS ---
  function setupRealtimeFeatures() {
    
    // 1. Deteksi User Online
    const myStatusRef = ref(db, `status/${currentUser}`);
    const connectedRef = ref(db, '.info/connected');

    onValue(connectedRef, (snap) => {
      if (snap.val() === true) {
        set(myStatusRef, "online");
        onDisconnect(myStatusRef).remove(); // Hapus otomatis kalau internet putus
      }
    });

    // Hitung berapa orang online
    onValue(ref(db, 'status'), (snap) => {
      const count = snap.size || 0;
      onlineCountSpan.textContent = `${count} Online`;
    });

    // 2. Deteksi Orang Lain Mengetik
    onValue(ref(db, 'typing'), (snap) => {
      const typers = [];
      snap.forEach(child => {
        if (child.key !== currentUser && child.val()) typers.push(child.key);
      });
      
      if (typers.length > 0) {
        typingDiv.textContent = `${typers.join(', ')} sedang mengetik...`;
      } else {
        typingDiv.textContent = '';
      }
    });
  }

  // Kirim status mengetik saya ke DB
  function handleTyping() {
    const myTypingRef = ref(db, `typing/${currentUser}`);
    set(myTypingRef, true);
    
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      remove(myTypingRef);
    }, 2000); // Hilang setelah 2 detik diam
  }
</script>

</body>
</html>
