<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chit!</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" />

  <style>
    /* === STYLE UTAMA (SAMA SEPERTI SEBELUMNYA) === */
    :root {
      --primary: #6C63FF;
      --glass: rgba(255, 255, 255, 0.9);
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
      background: var(--bg-gradient);
      height: 100vh; display: flex; justify-content: center; align-items: center;
      color: #333; overflow: hidden;
    }

    .app-container {
      width: 100%; max-width: 450px; height: 90vh;
      background: var(--glass);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      display: flex; flex-direction: column; overflow: hidden; position: relative;
    }
    
    @media (max-width: 500px) { .app-container { height: 100vh; border-radius: 0; max-width: 100%; } }

    /* AUTH SCREEN */
    #auth-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      padding: 40px; display: flex; flex-direction: column; justify-content: center;
      background: white; z-index: 100; transition: transform 0.3s ease;
    }
    .auth-title { font-size: 28px; font-weight: 600; color: var(--primary); margin-bottom: 5px;}
    .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; outline: none; transition: 0.3s;}
    .input-field:focus { border-color: var(--primary); }
    .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    
    /* LOBBY SCREEN (DAFTAR KONTAK) */
    #lobby-screen {
      height: 100%; display: flex; flex-direction: column;
    }
    .lobby-header {
      padding: 20px; background: white; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between; align-items: center;
    }
    .my-profile h2 { margin: 0; font-size: 18px; }
    .my-profile span { font-size: 12px; color: #666; }
    
    .contact-list { flex: 1; overflow-y: auto; padding: 10px; }
    .contact-item {
      padding: 15px; background: rgba(255,255,255,0.6); margin-bottom: 10px; border-radius: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s;
    }
    .contact-item:hover { background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .avatar-circle { width: 40px; height: 40px; background: var(--primary); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px;}
    
    .fab-search {
      position: absolute; bottom: 20px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%; background: var(--primary);
      color: white; border: none; display: flex; justify-content: center; align-items: center;
      box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4); cursor: pointer;
    }

    /* CHAT SCREEN (PRIVATE) */
    #chat-screen {
      height: 100%; display: flex; flex-direction: column; background: #f4f7f6;
    }
    .chat-header {
      padding: 15px; background: white; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee;
    }
    .btn-back { background: none; border: none; font-size: 24px; cursor: pointer; color: #333; }
    .chat-partner-name { font-weight: 600; font-size: 16px; }
    
    #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
    .message { max-width: 75%; padding: 10px 15px; border-radius: 16px; font-size: 14px; position: relative; word-wrap: break-word; }
    .message.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
    .message.friend { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 2px; }
    .message img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
    .msg-time { font-size: 9px; opacity: 0.7; text-align: right; margin-top: 4px; display: block;}

    .input-area { padding: 10px; background: white; display: flex; gap: 10px; align-items: center; }
    #msg-input { flex: 1; padding: 12px; border: none; background: #f0f2f5; border-radius: 20px; outline: none; }
    .btn-icon { background: none; border: none; color: var(--primary); cursor: pointer; display: flex; align-items: center;}

    /* UTILS */
    .hidden { display: none !important; }
    #loading { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:200; display:none; justify-content:center; align-items:center; font-weight:bold;}
  </style>
</head>
<body>

<div id="loading">Loading...</div>

<div class="app-container">
  
  <div id="auth-screen">
    <div id="form-login">
      <h2 class="auth-title">Login 👋</h2>
      <input type="email" id="login-email" class="input-field" placeholder="Email">
      <input type="password" id="login-pass" class="input-field" placeholder="Password">
      <button id="btn-do-login" class="btn-primary">Masuk</button>
      <p style="text-align:center; font-size:13px; margin-top:15px;">Belum punya akun? <span onclick="switchForm('register')" style="color:var(--primary); cursor:pointer; font-weight:bold;">Daftar</span></p>
    </div>

    <div id="form-register" class="hidden">
      <h2 class="auth-title">Daftar Baru 🚀</h2>
      <p style="font-size:12px; color:#666; margin-bottom:10px;"></p>
      <input type="text" id="reg-username" class="input-field" placeholder="Username (ex: budi.01)">
      <input type="email" id="reg-email" class="input-field" placeholder="Email">
      <input type="password" id="reg-pass" class="input-field" placeholder="Password">
      <button id="btn-do-register" class="btn-primary">Daftar Akun</button>
      <p style="text-align:center; font-size:13px; margin-top:15px;">Sudah punya akun? <span onclick="switchForm('login')" style="color:var(--primary); cursor:pointer; font-weight:bold;">Login</span></p>
    </div>
  </div>

  <div id="lobby-screen" class="hidden">
    <div class="lobby-header">
      <div class="my-profile">
        <h2 id="my-display-name">Loading...</h2>
        <span>Status: Online</span>
      </div>
      <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer;"><span class="material-symbols-rounded">logout</span></button>
    </div>
    
    <div class="contact-list" id="contact-list">
      <div style="text-align:center; margin-top:50px; color:#999; font-size:14px;">
        Belum ada chat.<br>Klik tombol (+) untuk cari teman.
      </div>
    </div>

    <button class="fab-search" id="btn-search-user">
      <span class="material-symbols-rounded">add</span>
    </button>
  </div>

  <div id="chat-screen" class="hidden">
    <div class="chat-header">
      <button class="btn-back" id="btn-back-lobby">
        <span class="material-symbols-rounded">arrow_back</span>
      </button>
      <div class="avatar-circle" id="partner-initial">?</div>
      <div class="chat-partner-name" id="chat-partner-name">Nama Teman</div>
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
      <input type="file" id="file-input" hidden accept="image/*">
      <button class="btn-icon" id="btn-img"><span class="material-symbols-rounded">image</span></button>
      <input type="text" id="msg-input" placeholder="Ketik pesan..." autocomplete="off">
      <button class="btn-icon" id="btn-send"><span class="material-symbols-rounded">send</span></button>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, push, set, get, onChildAdded, onValue, off, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  // === ⚠️ GANTI CONFIG DI BAWAH INI ===
  const firebaseConfig = {
    apiKey: "AIzaSyC8K8RbOFFov1OgL2R4KhE9_GcPZVnl3rM",
    authDomain: "chatv2-6016c.firebaseapp.com",
    databaseURL: "https://chatv2-6016c-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "chatv2-6016c",
    storageBucket: "chatv2-6016c.firebasestorage.app",
    messagingSenderId: "9135681580",
    appId: "1:9135681580:web:9bb64a480ddc49c968e189",
    measurementId: "G-1Q5S8TLX3V"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);

  // Global Variables
  let myUsername = "";
  let currentPartner = "";
  let currentRoomId = "";

  // UI References
  const authScreen = document.getElementById('auth-screen');
  const lobbyScreen = document.getElementById('lobby-screen');
  const chatScreen = document.getElementById('chat-screen');
  const chatBox = document.getElementById('chat-box');
  const loading = document.getElementById('loading');

  // --- 1. SYSTEM AUTHENTICATION ---
  onAuthStateChanged(auth, (user) => {
    if (user) {
      myUsername = user.displayName;
      document.getElementById('my-display-name').textContent = "@" + myUsername;
      showLobby();
      loadContacts(); // Load daftar chat
    } else {
      showAuth();
    }
  });

  // Register Logic (Strict Username)
  document.getElementById('btn-do-register').addEventListener('click', async () => {
    const uName = document.getElementById('reg-username').value.toLowerCase().trim();
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-pass').value;

    if(!/^[a-z0-9._]+$/.test(uName)) return alert("Username tidak valid! Hanya huruf kecil, angka, titik, dan _");
    
    showLoading(true);
    try {
      const userRef = ref(db, 'users/' + uName);
      const snap = await get(userRef);
      if(snap.exists()) throw new Error("Username sudah dipakai!");

      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: uName });
      await set(userRef, { email: email, uid: cred.user.uid }); // Simpan ke phonebook
      
      alert("Berhasil! Silakan login.");
      switchForm('login');
    } catch(e) { alert(e.message); } 
    finally { showLoading(false); }
  });

  document.getElementById('btn-do-login').addEventListener('click', async () => {
    try {
      showLoading(true);
      await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value);
    } catch(e) { alert("Login Gagal: " + e.message); }
    finally { showLoading(false); }
  });

  // --- 2. LOBBY & SEARCH SYSTEM ---
  
  // Cari Teman
  document.getElementById('btn-search-user').addEventListener('click', async () => {
    const target = prompt("Masukkan Username teman (tanpa @):");
    if(!target) return;
    const cleanTarget = target.toLowerCase().trim();

    if(cleanTarget === myUsername) return alert("Gak bisa chat diri sendiri dong 😂");

    showLoading(true);
    try {
      const snap = await get(ref(db, 'users/' + cleanTarget));
      if(snap.exists()) {
        // Ketemu! Langsung buka chat
        startPrivateChat(cleanTarget);
      } else {
        alert("User tidak ditemukan 😢");
      }
    } finally { showLoading(false); }
  });

  // Load Daftar Kontak (Riwayat Chat)
  function loadContacts() {
    const contactsRef = ref(db, 'contacts/' + myUsername);
    onValue(contactsRef, (snap) => {
      const listDiv = document.getElementById('contact-list');
      listDiv.innerHTML = "";
      
      if(!snap.exists()) {
        listDiv.innerHTML = '<div style="text-align:center; margin-top:50px; color:#999; font-size:12px;">Mulai chat dengan menekan tombol (+)</div>';
        return;
      }

      snap.forEach(child => {
        const partnerName = child.key;
        const div = document.createElement('div');
        div.className = "contact-item";
        div.innerHTML = `
          <div class="avatar-circle">${partnerName[0].toUpperCase()}</div>
          <div><b>@${partnerName}</b></div>
        `;
        div.onclick = () => startPrivateChat(partnerName);
        listDiv.appendChild(div);
      });
    });
  }

  // --- 3. PRIVATE CHAT SYSTEM ---

  function startPrivateChat(partnerName) {
    currentPartner = partnerName;
    
    // LOGIKA PENTING: Membuat Room ID yang konsisten
    // Urutkan nama user secara abjad. Contoh: "anton" & "budi" -> "anton_budi"
    // Jadi siapapun yang mulai, room id nya akan selalu sama.
    const pair = [myUsername, currentPartner].sort();
    currentRoomId = pair.join('_');

    // Simpan ke daftar kontak kita & dia (supaya muncul di lobby masing-masing)
    set(ref(db, `contacts/${myUsername}/${currentPartner}`), true);
    set(ref(db, `contacts/${currentPartner}/${myUsername}`), true);

    // Setup UI Chat
    document.getElementById('chat-partner-name').textContent = "@" + currentPartner;
    document.getElementById('partner-initial').textContent = currentPartner[0].toUpperCase();
    
    showChatScreen();
    loadMessages(currentRoomId);
  }

  function loadMessages(roomId) {
    chatBox.innerHTML = "";
    // Matikan listener lama kalau ada (supaya gak dobel)
    // Di versi simple ini kita langsung assign onChildAdded baru
    
    const messagesRef = ref(db, 'private_messages/' + roomId);
    
    // Hapus listener sebelumnya (sedikit trik, kita pakai 'off' manual kalau perlu, tapi disini kita overwrite UI)
    // Untuk performa terbaik sebaiknya simpan referensi listener, tapi untuk pemula ini cukup.
    
    onChildAdded(messagesRef, (snap) => {
      const msg = snap.val();
      renderMessage(msg);
    });
  }

  function renderMessage(msg) {
    const isMe = msg.sender === myUsername;
    const div = document.createElement('div');
    div.className = `message ${isMe ? 'me' : 'friend'}`;
    
    let content = "";
    if(msg.type === 'image') content = `<img src="${msg.text}" onclick="window.open(this.src)">`;
    else content = `<div>${msg.text}</div>`;
    
    const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    div.innerHTML = `${content} <span class="msg-time">${time}</span>`;
    
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // --- SEND MESSAGE ---
  document.getElementById('btn-send').addEventListener('click', sendText);
  document.getElementById('msg-input').addEventListener('keydown', e => { if(e.key === "Enter") sendText(); });

  async function sendText() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if(!text || !currentRoomId) return;

    await push(ref(db, 'private_messages/' + currentRoomId), {
      sender: myUsername,
      text: text,
      type: 'text',
      timestamp: serverTimestamp()
    });
    input.value = "";
  }

  // SEND IMAGE
  document.getElementById('btn-img').addEventListener('click', () => document.getElementById('file-input').click());
  document.getElementById('file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    showLoading(true);
    try {
      const storageRef = sRef(storage, `private_imgs/${currentRoomId}/${Date.now()}_${file.name}`);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);
      await push(ref(db, 'private_messages/' + currentRoomId), {
        sender: myUsername,
        text: url,
        type: 'image',
        timestamp: serverTimestamp()
      });
    } catch(err) { alert(err.message); }
    finally { showLoading(false); }
  });

  // --- NAVIGATION & UTILS ---
  document.getElementById('btn-back-lobby').addEventListener('click', showLobby);
  
  window.logout = () => signOut(auth);
  window.switchForm = (type) => {
    if(type === 'register') {
      document.getElementById('form-login').classList.add('hidden');
      document.getElementById('form-register').classList.remove('hidden');
    } else {
      document.getElementById('form-login').classList.remove('hidden');
      document.getElementById('form-register').classList.add('hidden');
    }
  };

  function showAuth() {
    authScreen.classList.remove('hidden');
    authScreen.style.transform = "translateY(0)";
    lobbyScreen.classList.add('hidden');
    chatScreen.classList.add('hidden');
  }
  function showLobby() {
    authScreen.style.transform = "translateY(-100%)";
    lobbyScreen.classList.remove('hidden');
    chatScreen.classList.add('hidden');
  }
  function showChatScreen() {
    lobbyScreen.classList.add('hidden');
    chatScreen.classList.remove('hidden');
  }
  function showLoading(show) { loading.style.display = show ? 'flex' : 'none'; }
</script>

</body>
</html>
